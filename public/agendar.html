<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar - Barbearia Estilo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">✂️ Barbearia Estilo</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="agendar.html">Agendar</a></li>
                <li><a href="meus-agendamentos.html">Meus Agendamentos</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Agende seu Horário</h1>
            <p>Preencha o formulário abaixo para reservar seu horário</p>
        </div>

        <div class="booking-container">
            <form id="bookingForm" class="booking-form">
                <div class="form-group">
                    <label>Nome Completo:</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label>E-mail:</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label>Telefone:</label>
                    <input type="tel" id="telefone" required placeholder="(11) 99999-9999">
                </div>

                <div class="form-group">
                    <label>Serviço:</label>
                    <select id="servico" required>
                        <option value="">Selecione um serviço</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Data:</label>
                    <input type="date" id="data" required>
                </div>

                <div class="form-group">
                    <label>Horário:</label>
                    <select id="horario" required>
                        <option value="">Selecione um horário</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Observações (opcional):</label>
                    <textarea id="observacoes" rows="3" placeholder="Alguma observação?"></textarea>
                </div>

                <button type="submit" class="btn-primary">Confirmar Agendamento</button>
            </form>
            <div id="messageResult" class="message-result"></div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 Barbearia Estilo - Todos os direitos reservados</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
